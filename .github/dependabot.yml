---
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      # Home Assistant version is owned by check-ha-version.yml (which derives
      # it from pytest-homeassistant-custom-component on PyPI) and by the
      # `homeassistant` field in hacs.json — not by Dependabot.
      - dependency-name: "homeassistant"
      # pytest-homeassistant-custom-component pins a specific Home Assistant
      # version, so it must move in lockstep with .github/ha-test-versions.json
      # via check-ha-version.yml rather than an independent Dependabot PR.
      - dependency-name: "pytest-homeassistant-custom-component"
      # pytest-homeassistant-custom-component also pins its pytest-cov version,
      # so widening this direct constraint independently can break resolution.
      - dependency-name: "pytest-cov"
