name: Publish project release action

on:
  push:
    # Trigger on tag push (release-please pushes tags after merging its release
    # PR). Using branch-push would race with release-please when both fire on
    # the same merge commit: softprops/action-gh-release uses GITHUB_TOKEN, which
    # is not in the tag-protection bypass list, so it cannot push the tag if
    # release-please hasn't yet — and if it has, the duplicate-tag push fails.
    # Tag-push trigger serializes the flow: tag is already in place when this
    # workflow runs, softprops just attaches the release to it.
    tags: ['*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  create-release:
    name: Publish project release job
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      # Push to GitHub Releases (no NuGet/Docker Hub equivalents for an HA component).
      github: true

  date-badge:
    name: Create BYOB date badge job
    needs: [create-release]
    uses: ./.github/workflows/build-datebadge-task.yml
    secrets: inherit
    permissions:
      contents: write
