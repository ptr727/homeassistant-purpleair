name: Publish project release action

on:
  # Stable releases are manual: dispatched from main when a maintainer is
  # ready to ship. Pushes to main do not auto-publish — that lets dependabot
  # / HA-version-bump PRs merge to main without cutting a release.
  workflow_dispatch: {}
  # Pre-releases are automatic on every develop push so beta testers always
  # have the latest. The -gSHA prerelease segment in the NBGV version keeps
  # successive prereleases from colliding on the same tag.
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  gate:
    name: Gate dispatch ref job
    # Reject manual dispatches from anywhere other than main. The push trigger
    # is already constrained to develop by `on.push.branches`, so it doesn't
    # need an equivalent check.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Assert dispatch is from main step
        run: |
          set -euo pipefail
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
              echo "::error::Stable releases must be dispatched from main; got ${{ github.ref }}."
              exit 1
          fi

  test-release:
    name: Test release job
    needs: [gate]
    # Manual stable releases on main only. Reuses test-release-task.yml —
    # the same suite that gates PR merges — so a maintainer dispatching
    # `gh workflow run publish-release.yml --ref main` against a regressed
    # main tip cannot ship: ruff, mypy --strict, pytest matrix, hassfest,
    # and HACS validation all have to pass first.
    #
    # Pass `build: false` so test-release-task skips its no-publish
    # build-release child. The create-release job below builds the
    # artifact for real immediately after, and two builds in the same
    # workflow run would (a) produce two same-named `purpleair-zip`
    # artifacts and (b) double the build cost for no extra signal.
    #
    # Skipped on push-to-develop because for those triggers
    # test-pull-request.yml is also fired by the same push and runs the
    # same suite (against the same SHA) in parallel. We don't strictly
    # block on it before publishing the prerelease — develop is the
    # rolling beta channel — and a failure shows up on the parallel
    # run; running it inside publish-release.yml would just duplicate
    # the work without strengthening the gate.
    if: github.event_name == 'workflow_dispatch' && needs.gate.result == 'success'
    uses: ./.github/workflows/test-release-task.yml
    secrets: inherit
    with:
      build: false

  create-release:
    name: Publish project release job
    needs: [gate, test-release]
    # Two paths are valid:
    # - workflow_dispatch on main: gate=success, test-release=success.
    # - push to develop: gate=skipped, test-release=skipped (the same
    #   suite runs in parallel via test-pull-request.yml; gating here
    #   would duplicate it without strengthening the prerelease gate).
    # Explicitly allowlist success/skipped on each dependency so a
    # `cancelled` outcome (timeout, manual cancel, runner failure) blocks
    # publish — != 'failure' alone would let cancelled through.
    if: >-
      always() &&
      (needs.gate.result == 'success' || needs.gate.result == 'skipped') &&
      (needs.test-release.result == 'success' || needs.test-release.result == 'skipped')
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      # Push to GitHub Releases (no NuGet/Docker Hub equivalents for an HA component).
      github: true

  date-badge:
    name: Create BYOB date badge job
    needs: [create-release]
    # Stable releases only arrive via workflow_dispatch on main (the gate
    # job enforces this). Skip the entire reusable workflow on develop-push
    # prereleases so we don't pay for a checkout + NBGV setup just to skip
    # the badge update.
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-datebadge-task.yml
    secrets: inherit
    permissions:
      contents: write
