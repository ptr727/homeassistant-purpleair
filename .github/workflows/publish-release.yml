name: Publish project release action

on:
  # Stable releases are manual: dispatched from main when a maintainer is
  # ready to ship. Pushes to main do not auto-publish — that lets dependabot
  # / HA-version-bump PRs merge to main without cutting a release.
  workflow_dispatch: {}
  # Pre-releases are automatic on every develop push so beta testers always
  # have the latest. The -gSHA prerelease segment in the NBGV version keeps
  # successive prereleases from colliding on the same tag.
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  gate:
    name: Gate dispatch ref job
    # Reject manual dispatches from anywhere other than main. The push trigger
    # is already constrained to develop by `on.push.branches`, so it doesn't
    # need an equivalent check.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Assert dispatch is from main step
        run: |
          set -euo pipefail
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
              echo "::error::Stable releases must be dispatched from main; got ${{ github.ref }}."
              exit 1
          fi

  test-release:
    name: Test release job
    needs: [gate]
    # Manual stable releases on main only. Reuses test-release-task.yml —
    # the same suite that gates PR merges — so a maintainer dispatching
    # `gh workflow run publish-release.yml --ref main` against a regressed
    # main tip cannot ship: ruff, mypy --strict, pytest matrix, hassfest,
    # HACS validation, plus a no-publish build that exercises NBGV
    # stamping all have to pass first.
    #
    # Skipped on push-to-develop because develop's content has already
    # passed exactly this suite via test-pull-request.yml when the PR
    # that produced the develop commit merged. Re-running here would
    # double CI time per merge for no extra signal.
    if: github.event_name == 'workflow_dispatch' && needs.gate.result == 'success'
    uses: ./.github/workflows/test-release-task.yml
    secrets: inherit

  create-release:
    name: Publish project release job
    needs: [gate, test-release]
    # Two paths are valid:
    # - workflow_dispatch on main: gate=success, test-release=success.
    # - push to develop: gate=skipped, test-release=skipped (intentionally,
    #   develop is already tested via the PR that landed each commit).
    if: ${{ always() && needs.gate.result != 'failure' && needs.test-release.result != 'failure' }}
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      # Push to GitHub Releases (no NuGet/Docker Hub equivalents for an HA component).
      github: true

  date-badge:
    name: Create BYOB date badge job
    needs: [create-release]
    uses: ./.github/workflows/build-datebadge-task.yml
    secrets: inherit
    permissions:
      contents: write
