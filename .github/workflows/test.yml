name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions: {}

jobs:
  pytest:
    name: "pytest (HA ${{ matrix.ha-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported HA version — must match hacs.json["homeassistant"]
          # and the pin in requirements.txt. Bumped to 2026.4.0 because the
          # entity registry's `aliases` field changed shape in 2026.4
          # (set[str] → list[AliasEntry] with COMPUTED_NAME sentinel) and our
          # snapshot tests can't satisfy both pre- and post-2026.4 formats
          # from a single snapshot file.
          - python-version: "3.14"
            ha-version: "2026.4.0"
            # pytest-homeassistant-custom-component pins `homeassistant==X.Y.Z`
            # per release; 0.13.321 is the release that targets HA 2026.4.0.
            pytest-hacc-version: "0.13.321"
          # Latest HA release — bump both versions together when HA publishes.
          - python-version: "3.14"
            ha-version: "2026.4.3"
            pytest-hacc-version: "0.13.324"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-test.txt
          python -m pip install --upgrade \
            homeassistant==${{ matrix.ha-version }} \
            pytest-homeassistant-custom-component==${{ matrix.pytest-hacc-version }}

      - name: Run pytest
        run: python -m pytest -ra
