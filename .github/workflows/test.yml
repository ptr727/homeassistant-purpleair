name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions: {}

jobs:
  pytest:
    name: "pytest (HA ${{ matrix.ha-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported HA version — must match hacs.json["homeassistant"]
          # and the pin in requirements.txt.
          - python-version: "3.14"
            ha-version: "2026.3.2"
            pytest-hacc-version: "0.13.318"
          # Latest HA release — bump both versions together when HA publishes.
          - python-version: "3.14"
            ha-version: "2026.4.3"
            pytest-hacc-version: "0.13.324"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-test.txt
          python -m pip install --upgrade \
            homeassistant==${{ matrix.ha-version }} \
            pytest-homeassistant-custom-component==${{ matrix.pytest-hacc-version }}

      - name: Run pytest
        run: python -m pytest -ra
