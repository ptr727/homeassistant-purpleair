name: Get version information task

on:
  workflow_call:
    outputs:
      SemVer2:
        description: "Version string from manifest.json (raw)."
        value: ${{ jobs.get-version.outputs.SemVer2 }}
      Tag:
        description: "Git tag / release name to use (matches SemVer2 verbatim)."
        value: ${{ jobs.get-version.outputs.Tag }}
      Prerelease:
        description: "'true' if the manifest version contains a SemVer prerelease segment (e.g. 0.2.0-beta.1), 'false' for stable versions (e.g. 0.2.0). Derived from the version string itself, not from the triggering ref."
        value: ${{ jobs.get-version.outputs.Prerelease }}

jobs:

  get-version:
    name: Read version from manifest.json job
    runs-on: ubuntu-latest
    outputs:
      SemVer2: ${{ steps.read.outputs.SemVer2 }}
      Tag: ${{ steps.read.outputs.Tag }}
      Prerelease: ${{ steps.read.outputs.Prerelease }}

    steps:

      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read and validate version step
        id: read
        # `jq -e` exits non-zero when `select(...)` filters the value out, so a
        # version that doesn't match SemVer2 fails the workflow before any
        # expensive downstream job runs. Prerelease is derived from the version
        # string itself (SemVer prerelease segment introduced by '-') rather
        # than from github.ref_name, because publish-release.yml is triggered
        # by tag push and ref_name is the tag, never the branch.
        run: |
          set -euo pipefail
          VERSION=$(jq -e -r '.version | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9A-Za-z.-]+)?(\\+[0-9A-Za-z.-]+)?$"))' custom_components/purpleair/manifest.json)
          echo "SemVer2=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag=$VERSION" >> "$GITHUB_OUTPUT"
          # SemVer: a '-' only appears in the prerelease segment; build
          # metadata is '+'-introduced and irrelevant to release status.
          if [[ "$VERSION" == *-* ]]; then
              PRERELEASE=true
          else
              PRERELEASE=false
          fi
          echo "Prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (prerelease: $PRERELEASE)"
