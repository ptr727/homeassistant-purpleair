name: Get version information task

on:
  workflow_call:
    outputs:
      SemVer2:
        description: "SemVer2-shaped version computed by Nerdbank.GitVersioning from version.json + git history."
        value: ${{ jobs.get-version.outputs.SemVer2 }}
      Tag:
        description: "Git tag / release name to use (matches SemVer2 verbatim, no v prefix)."
        value: ${{ jobs.get-version.outputs.Tag }}
      Prerelease:
        description: "'true' on non-public refs (NBGV emits a -gSHA prerelease segment), 'false' on public refs (clean SemVer like 0.1.5)."
        value: ${{ jobs.get-version.outputs.Prerelease }}

jobs:

  get-version:
    name: Compute version with Nerdbank.GitVersioning job
    runs-on: ubuntu-latest
    outputs:
      SemVer2: ${{ steps.out.outputs.SemVer2 }}
      Tag: ${{ steps.out.outputs.Tag }}
      Prerelease: ${{ steps.out.outputs.Prerelease }}

    steps:

      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # NBGV walks history height; shallow clone breaks version computation.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET SDK step
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10'

      - name: Run Nerdbank.GitVersioning step
        id: nbgv
        uses: dotnet/nbgv@3cf2d96c2aa00675081b59f401356ac1fb81092f # v0.5.1

      - name: Compose workflow outputs step
        id: out
        # NBGV's PrereleaseVersion output only carries the `-tag` segment from
        # version.json's `version` field (e.g. `-beta`); it's empty when
        # version.json has a bare `0.1`. The auto-appended `-g{sha}` segment
        # lives in SemVer2 itself but is NOT exposed in PrereleaseVersion.
        # Detect prerelease by checking SemVer2 for any `-` segment instead:
        # that's true for `0.1.5-g1a2b3c4` (develop) and false for `0.1.5`
        # (main, public). This also keeps a manual workflow_dispatch from the
        # wrong branch honest about its prerelease status.
        env:
          SEMVER2: ${{ steps.nbgv.outputs.SemVer2 }}
        run: |
          set -euo pipefail
          echo "SemVer2=$SEMVER2" >> "$GITHUB_OUTPUT"
          echo "Tag=$SEMVER2" >> "$GITHUB_OUTPUT"
          if [[ "$SEMVER2" == *-* ]]; then
              PRERELEASE=true
          else
              PRERELEASE=false
          fi
          echo "Prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $SEMVER2 (prerelease: $PRERELEASE)"
