name: Test release task

on:
  workflow_call:
  workflow_dispatch:

jobs:

  ruff:
    name: Ruff job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python step
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install requirements step
        run: python3 -m pip install -r requirements.txt

      - name: Lint step
        run: python3 -m ruff check .

      - name: Format step
        run: python3 -m ruff format . --check

  mypy:
    name: Mypy strict-typing job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python step
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install requirements step
        run: python3 -m pip install -r requirements-test.txt

      - name: Run mypy --strict step
        # Platinum quality-scale rule "strict-typing" requires a clean run.
        run: python3 -m mypy --strict --follow-imports=silent custom_components/purpleair/

  read-versions:
    name: Read HA test matrix job
    # The matrix is sourced from .github/ha-test-versions.json so that
    # check-ha-version.yml can bump it via PR. `minimum` is hand-maintained
    # (must match hacs.json["homeassistant"] and the pin in requirements.txt;
    # currently 2026.4.0 because the entity registry's `aliases` field changed
    # shape in 2026.4 and our snapshot tests can't satisfy both pre- and
    # post-2026.4 formats); `latest` is bot-maintained.
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.parse.outputs.include }}
    steps:
      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build matrix include array step
        id: parse
        run: |
          set -euo pipefail
          INCLUDE=$(jq -c '
            [ .minimum, .latest ]
            | map({
                "python-version": "3.14",
                "ha-version": .ha,
                "pytest-hacc-version": ."pytest-hacc"
              })
          ' .github/ha-test-versions.json)
          echo "include=$INCLUDE" >> "$GITHUB_OUTPUT"
          echo "Matrix: $INCLUDE"

  pytest:
    name: "pytest job (HA ${{ matrix.ha-version }})"
    runs-on: ubuntu-latest
    needs: [read-versions]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.read-versions.outputs.include) }}
    steps:
      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }} step
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies step
        run: |
          python -m pip install -r requirements-test.txt
          python -m pip install --upgrade \
            homeassistant==${{ matrix.ha-version }} \
            pytest-homeassistant-custom-component==${{ matrix.pytest-hacc-version }}

      - name: Run pytest step
        run: python -m pytest -ra

  hassfest:
    # https://developers.home-assistant.io/blog/2020/04/16/hassfest
    name: Hassfest validation job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run hassfest validation step
        uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b # master

  hacs:
    # https://github.com/hacs/action
    name: HACS validation job
    runs-on: ubuntu-latest
    steps:
      - name: Run HACS validation step
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

  build-release:
    name: Build release without publishing job
    needs: [ruff, mypy, pytest, hassfest, hacs]
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    with:
      # Validate the build pipeline produces purpleair.zip without publishing.
      github: false
