name: Test release task

on:
  workflow_call:
    inputs:
      # Controls whether the no-publish build-release child job runs.
      # PR-trigger callers (test-pull-request.yml) want it true so the
      # build path is validated end-to-end on every PR. The
      # publish-release.yml caller wants it false because create-release
      # builds the artifact for real immediately after; running both
      # would double the build cost and produce two purpleair-zip
      # artifacts in the same workflow run, which only works because of
      # an undocumented quirk of actions/upload-artifact.
      build:
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    # Mirror the workflow_call input so manual `gh workflow run
    # test-release-task.yml` dispatches behave the same. Without this,
    # `inputs.build` is unset on dispatch and the `if: ${{ inputs.build }}`
    # condition on build-release evaluates falsy regardless of the
    # workflow_call default.
    inputs:
      build:
        description: "Whether to run the no-publish build-release child job."
        required: false
        type: boolean
        default: true

jobs:

  ruff:
    name: Ruff job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python step
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install requirements step
        run: python3 -m pip install -r requirements.txt

      - name: Lint step
        run: python3 -m ruff check .

      - name: Format step
        run: python3 -m ruff format . --check

  mypy:
    name: Mypy strict-typing job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python step
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install requirements step
        run: python3 -m pip install -r requirements-test.txt

      - name: Run mypy --strict step
        # Platinum quality-scale rule "strict-typing" requires a clean run.
        run: python3 -m mypy --strict --follow-imports=silent custom_components/purpleair/

  read-versions:
    name: Read HA test matrix job
    # The matrix is sourced from .github/ha-test-versions.json so that
    # check-ha-version.yml can bump it via PR. `minimum` is hand-maintained
    # (must match hacs.json["homeassistant"] and the pin in requirements.txt;
    # currently 2026.4.0 because the entity registry's `aliases` field changed
    # shape in 2026.4 and our snapshot tests can't satisfy both pre- and
    # post-2026.4 formats); `latest` is bot-maintained.
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.parse.outputs.include }}
    steps:
      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build matrix include array step
        id: parse
        run: |
          set -euo pipefail
          INCLUDE=$(jq -c '
            [ .minimum, .latest ]
            | map({
                "python-version": "3.14",
                "ha-version": .ha,
                "pytest-hacc-version": ."pytest-hacc"
              })
          ' .github/ha-test-versions.json)
          echo "include=$INCLUDE" >> "$GITHUB_OUTPUT"
          echo "Matrix: $INCLUDE"

  pytest:
    name: "pytest job (HA ${{ matrix.ha-version }})"
    runs-on: ubuntu-latest
    needs: [read-versions]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.read-versions.outputs.include) }}
    steps:
      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }} step
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies step
        run: |
          python -m pip install -r requirements-test.txt
          python -m pip install --upgrade \
            homeassistant==${{ matrix.ha-version }} \
            pytest-homeassistant-custom-component==${{ matrix.pytest-hacc-version }}

      - name: Run pytest step
        run: python -m pytest -ra --cov=custom_components/purpleair --cov-report=xml --cov-branch

      - name: Upload coverage to Codecov step
        # Tokenless OIDC uploads are rejected on protected-branch PR runs
        # ("Token required because branch is protected"), so the upload
        # always uses CODECOV_TOKEN. `flags` lets Codecov break down
        # coverage per HA matrix slot in the dashboard, while the repo's
        # overall coverage badge merges all uploads for a SHA.
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ha-${{ matrix.ha-version }}
          fail_ci_if_error: false

  hassfest:
    # https://developers.home-assistant.io/blog/2020/04/16/hassfest
    name: Hassfest validation job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run hassfest validation step
        uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b # master

  hacs:
    # https://github.com/hacs/action
    name: HACS validation job
    runs-on: ubuntu-latest
    steps:
      - name: Run HACS validation step
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

  build-release:
    name: Build release without publishing job
    needs: [ruff, mypy, pytest, hassfest, hacs]
    # workflow_call delivers inputs.build as a real boolean (`true`/`false`)
    # but workflow_dispatch delivers it as the *string* `"true"`/`"false"`,
    # and the GitHub expression parser treats any non-empty string as truthy
    # — so a bare `if: ${{ inputs.build }}` would run this job even on a
    # manual dispatch with build=false. Compare against both forms.
    if: ${{ inputs.build == true || inputs.build == 'true' }}
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    with:
      # Validate the build pipeline produces purpleair.zip without publishing.
      github: false
