name: Build project release task

on:
  workflow_call:
    inputs:
      # Whether to publish to GitHub Releases. Callers set this to false to
      # validate the build pipeline (test-release-task) and true to actually
      # publish (publish-release).
      github:
        required: true
        type: boolean

permissions: {}

jobs:

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit

  build:
    name: Build release artifact job
    runs-on: ubuntu-latest
    needs: [get-version]
    permissions:
      contents: read

    steps:

      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build purpleair.zip step
        # Directory-at-root layout: the zip contains `purpleair/manifest.json`
        # so users extracting into HA's `custom_components/` get the right path.
        # Exclude __pycache__/*.pyc as defense in depth (a clean CI checkout
        # won't have them, but local re-runs of this script might).
        run: |
          set -euo pipefail
          cd custom_components
          zip -r ../purpleair.zip purpleair -x 'purpleair/__pycache__/*' '*.pyc'
          cd ..
          unzip -l purpleair.zip

      - name: Upload release artifact step
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: purpleair-zip
          path: purpleair.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release job
    runs-on: ubuntu-latest
    needs: [get-version, build]
    if: ${{ inputs.github }}
    permissions:
      contents: write

    steps:

      - name: Download release artifact step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: purpleair-zip
          path: ./Publish

      - name: Skip-if-exists guard step
        id: guard
        # Make publish-release idempotent under "push to develop/main"
        # triggers: re-pushing the same manifest version is a no-op rather
        # than crashing on a tag collision. The notice annotation surfaces
        # in the run summary so a forgotten version bump is still visible.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.get-version.outputs.Tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "::notice::Release $TAG already exists, skipping publish."
              echo "skip=true" >> "$GITHUB_OUTPUT"
          else
              echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release step
        if: steps.guard.outputs.skip != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.get-version.outputs.Tag }}
          prerelease: ${{ needs.get-version.outputs.Prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ./Publish/purpleair.zip
