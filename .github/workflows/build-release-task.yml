name: Build project release task

on:
  workflow_call:
    inputs:
      # Whether to publish to GitHub Releases. Callers set this to false to
      # validate the build pipeline (test-release-task) and true to actually
      # publish (publish-release).
      github:
        required: true
        type: boolean

jobs:

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit

  build:
    name: Build release artifact job
    runs-on: ubuntu-latest
    needs: [get-version]

    steps:

      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build purpleair.zip step
        # Directory-at-root layout: the zip contains `purpleair/manifest.json`
        # so users extracting into HA's `custom_components/` get the right path.
        # Exclude __pycache__/*.pyc as defense in depth (a clean CI checkout
        # won't have them, but local re-runs of this script might).
        run: |
          set -euo pipefail
          cd custom_components
          zip -r ../purpleair.zip purpleair -x 'purpleair/__pycache__/*' '*.pyc'
          cd ..
          unzip -l purpleair.zip

      - name: Upload release artifact step
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: purpleair-zip
          path: purpleair.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release job
    runs-on: ubuntu-latest
    needs: [get-version, build]
    if: ${{ inputs.github }}

    steps:

      - name: Download release artifact step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: purpleair-zip
          path: ./Publish

      - name: Detect existing release step
        id: guard
        # Normal flow: release-please.yml has already created the GitHub
        # Release for this tag with auto-generated notes (and pushed the tag,
        # which is what triggered this workflow). We just attach the build
        # artifact. Fallback: if a tag was pushed manually (e.g. recovery for
        # a release-please run that didn't create the release for some
        # reason), softprops below creates the release with notes + asset in
        # one shot.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.get-version.outputs.Tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "release-exists=true" >> "$GITHUB_OUTPUT"
          else
              echo "release-exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload purpleair.zip to existing release step
        if: steps.guard.outputs.release-exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.get-version.outputs.Tag }}
        # `--repo` is needed because this job has no checkout step, so `gh`
        # cannot infer the target repo from a git remote (matches the
        # adjacent `gh release view` invocation above).
        run: gh release upload "$TAG" ./Publish/purpleair.zip --clobber --repo "$GITHUB_REPOSITORY"

      - name: Create GitHub release step
        if: steps.guard.outputs.release-exists != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.get-version.outputs.Tag }}
          prerelease: ${{ needs.get-version.outputs.Prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ./Publish/purpleair.zip
