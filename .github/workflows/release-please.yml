name: Release Please action

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  release-please:
    name: Run release-please job
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Generate GitHub App token step
        # Use the codegen App so the release PR is authored by ptr727-codegen[bot]
        # and triggers PR workflows (PRs created by GITHUB_TOKEN do not).
        # `client-id` replaces the deprecated `app-id` per
        # actions/create-github-app-token v3+.
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.CODEGEN_APP_CLIENT_ID }}
          private-key: ${{ secrets.CODEGEN_APP_PRIVATE_KEY }}

      - name: Checkout the repository step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history + tags so the validation step below can walk commits
          # from the last release tag (or bootstrap-sha) up to HEAD.
          fetch-depth: 0
          fetch-tags: true

      - name: Validate Conventional Commits step
        # Belt-and-braces with the pr-title-lint job in test-pull-request.yml:
        # that job blocks non-CC PR titles from merging via the squash-only
        # path, but a force-push or admin-bypass push could in principle land
        # a non-CC commit on develop/main. release-please-action only logs
        # warnings for unparseable commits and silently skips the release —
        # this step makes that condition fatal so it surfaces immediately.
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$BRANCH" = "main" ]; then
              config=release-please-config.json
              manifest=.release-please-manifest.json
          else
              config=release-please-config-develop.json
              manifest=.release-please-manifest-develop.json
          fi
          bootstrap_sha=$(jq -r '."bootstrap-sha" // ""' "$config")
          manifest_version=$(jq -r '."." // ""' "$manifest")

          semver_regex='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if ! [[ "$manifest_version" =~ $semver_regex ]]; then
            echo "::error::Invalid release-please manifest value in $manifest: '$manifest_version'"
            echo "::error::Expected a SemVer string (for example 0.1.2 or 0.2.2-beta.1)."
            exit 1
          fi

          # Use the manifest's branch-specific latest release version as the
          # baseline. This avoids cross-branch tag selection (for example,
          # picking develop prerelease tags while validating main).
          if git rev-parse -q --verify "refs/tags/$manifest_version" >/dev/null; then
            from="$manifest_version"
          elif [ -n "$bootstrap_sha" ]; then
            echo "::warning::Tag $manifest_version from $manifest does not exist; using bootstrap-sha."
            from="$bootstrap_sha"
          else
            echo "::error::No valid baseline found (missing tag $manifest_version and no bootstrap-sha)."
            exit 1
          fi

          if ! git merge-base --is-ancestor "$from" HEAD; then
            if [ -n "$bootstrap_sha" ] && git merge-base --is-ancestor "$bootstrap_sha" HEAD; then
              echo "::warning::Baseline $from is not an ancestor of HEAD; using bootstrap-sha."
              from="$bootstrap_sha"
            else
              echo "::error::Baseline $from is not an ancestor of HEAD and no usable bootstrap-sha was found."
              exit 1
            fi
          fi
          # `--first-parent` walks only the branch's primary lineage so that
          # commits pulled in via a sync merge (e.g. "Update branch" button on
          # a develop ← main update) aren't treated as new work to validate —
          # only first-parent commits represent PR squash-merges into the
          # current branch. `--no-merges` then drops the merge commits
          # themselves, since their auto-generated subjects can't be CC and
          # release-please ignores them anyway. With squash-only merging
          # enforced repo-wide, this first-parent view matches release-please's
          # own scan set (every PR == one commit == one CC-shaped subject).
          echo "Validating first-parent non-merge commits in $from..HEAD as Conventional Commits"
          echo "(merge commits and history pulled in via sync-merges are intentionally skipped)"
          # Allowed types must match test-pull-request.yml's pr-title-lint
          # allowlist exactly.
          cc_regex='^(feat|fix|perf|chore|docs|refactor|test|build|ci|revert)(\([^)]+\))?!?: .+'
          non_cc=""
          while IFS= read -r line; do
              [ -z "$line" ] && continue
              sha="${line%% *}"
              rest="${line#* }"
              author_email="${rest%% *}"
              subject="${rest#* }"
              # Skip commits authored by bots (e.g. release-please direct pushes
              # to main/develop after a release — their messages are not CC).
              [[ "$author_email" == *"[bot]"* ]] && continue
              # Also skip direct "Update ..." commits that only touch
              # release-managed version files. These can be created by GitHub
              # automation with a human author email, and are outside the PR
              # squash path enforced by pr-title-lint.
              if [[ "$subject" =~ ^Update[[:space:]]+ ]] && \
               [[ -z "$(git diff-tree --no-commit-id --name-only -r "$sha" | \
                 grep -Ev '^(\.release-please-manifest(\-develop)?\.json|custom_components/purpleair/manifest\.json)$' || true)" ]]; then
                continue
              fi
              if ! [[ "$subject" =~ $cc_regex ]]; then
                  non_cc+="${sha} ${subject}"$'\n'
              fi
          done < <(git log --first-parent --no-merges --format='%H %ae %s' "$from"..HEAD)
          if [ -n "$non_cc" ]; then
              echo "::error::Found commits since $from that are not Conventional Commits:"
              printf '%s' "$non_cc"
              echo "::error::pr-title-lint should have caught these — check for force-pushes or admin-bypass pushes."
              exit 1
          fi
          echo "All commits since $from are Conventional Commits."

      - name: Run release-please for main step
        if: github.ref_name == 'main'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Run release-please for develop step
        if: github.ref_name == 'develop'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: develop
          config-file: release-please-config-develop.json
          manifest-file: .release-please-manifest-develop.json
