name: Build BYOB date badge task

on:
  workflow_call:

jobs:

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit

  date-badge:
    name: Build BYOB date badge job
    runs-on: ubuntu-latest
    needs: [get-version]
    # Two gates protect the badge update:
    # 1. The caller (publish-release.yml) gates on workflow_dispatch so this
    #    reusable workflow is never invoked on the develop-push prerelease
    #    path — that gate is cheap (no jobs run at all).
    # 2. This inner Prerelease check catches the residual case where
    #    workflow_dispatch on main still produces a prerelease version,
    #    e.g. if version.json's `version` field is set to a prerelease base
    #    like `0.2-beta` for a beta-on-main cycle. NBGV's SemVer2 then
    #    contains `-beta`, get-version-task flags Prerelease=true, and we
    #    still skip the badge update.
    if: needs.get-version.outputs.Prerelease == 'false'

    steps:

      - name: Get current date step
        id: date
        run: echo "date=$(date)" >> "$GITHUB_OUTPUT"

      - name: Build BYOB date badge step
        # RubbaBoy/BYOB doesn't publish SHA-pinnable releases, so this stays
        # on the floating v1 tag (matches the upstream template).
        uses: RubbaBoy/BYOB@v1
        with:
          name: lastbuild
          label: "Last Build"
          icon: "github"
          status: ${{ steps.date.outputs.date }}
          color: "blue"
          github_token: ${{ secrets.GITHUB_TOKEN }}
