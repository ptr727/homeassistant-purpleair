name: Build BYOB date badge task

on:
  workflow_call:

jobs:

  date-badge:
    name: Build BYOB date badge job
    runs-on: ubuntu-latest
    # Only update the "Last Build" badge for stable releases. publish-release.yml
    # triggers on tag push, so github.ref_name is the tag (e.g. "0.1.0"), not
    # the branch — the old `== 'main'` check would always fail. A stable tag is
    # one that has no SemVer prerelease segment, i.e. no `-` in the name
    # (`0.2.0` → stable, `0.2.0-beta.1` → prerelease, skip). Develop's
    # release-please config always emits `-beta.N` suffixes, so non-`-` tags
    # implicitly come from main's stable lineage.
    if: ${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}

    steps:

      - name: Get current date step
        id: date
        run: echo "date=$(date)" >> "$GITHUB_OUTPUT"

      - name: Build BYOB date badge step
        # RubbaBoy/BYOB doesn't publish SHA-pinnable releases, so this stays
        # on the floating v1 tag (matches the upstream template).
        uses: RubbaBoy/BYOB@v1
        with:
          name: lastbuild
          label: "Last Build"
          icon: "github"
          status: ${{ steps.date.outputs.date }}
          color: "blue"
          github_token: ${{ secrets.GITHUB_TOKEN }}
