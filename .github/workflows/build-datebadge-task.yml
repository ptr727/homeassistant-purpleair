name: Build BYOB date badge task

on:
  workflow_call:

jobs:

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit

  date-badge:
    name: Build BYOB date badge job
    runs-on: ubuntu-latest
    needs: [get-version]
    # Only update the "Last Build" badge for stable releases. publish-release.yml
    # is dispatched manually from main for stable releases and runs on push
    # to develop for prereleases — branch-name checks would have to know
    # which event fired, so we just reuse get-version-task's Prerelease
    # output (derived by checking SemVer2 itself for any `-` segment: develop
    # produces `0.X.Y-g<sha>`, main produces clean `0.X.Y`). Stable iff
    # Prerelease == 'false'.
    if: needs.get-version.outputs.Prerelease == 'false'

    steps:

      - name: Get current date step
        id: date
        run: echo "date=$(date)" >> "$GITHUB_OUTPUT"

      - name: Build BYOB date badge step
        # RubbaBoy/BYOB doesn't publish SHA-pinnable releases, so this stays
        # on the floating v1 tag (matches the upstream template).
        uses: RubbaBoy/BYOB@v1
        with:
          name: lastbuild
          label: "Last Build"
          icon: "github"
          status: ${{ steps.date.outputs.date }}
          color: "blue"
          github_token: ${{ secrets.GITHUB_TOKEN }}
