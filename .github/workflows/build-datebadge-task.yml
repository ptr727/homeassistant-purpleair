name: Build BYOB date badge task

on:
  workflow_call:

jobs:

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit

  date-badge:
    name: Build BYOB date badge job
    runs-on: ubuntu-latest
    needs: [get-version]
    # Only update the "Last Build" badge for stable releases. publish-release.yml
    # triggers on tag push, so github.ref_name is the tag (e.g. "0.1.0"), not
    # the branch — the old `== 'main'` check would always fail. Reuse the
    # `Prerelease` output from get-version-task, which strips SemVer build
    # metadata (`+...`) before checking for a prerelease segment, so a stable
    # build-tagged version like `1.0.0+build-1` isn't misclassified.
    if: needs.get-version.outputs.Prerelease == 'false'

    steps:

      - name: Get current date step
        id: date
        run: echo "date=$(date)" >> "$GITHUB_OUTPUT"

      - name: Build BYOB date badge step
        # RubbaBoy/BYOB doesn't publish SHA-pinnable releases, so this stays
        # on the floating v1 tag (matches the upstream template).
        uses: RubbaBoy/BYOB@v1
        with:
          name: lastbuild
          label: "Last Build"
          icon: "github"
          status: ${{ steps.date.outputs.date }}
          color: "blue"
          github_token: ${{ secrets.GITHUB_TOKEN }}
