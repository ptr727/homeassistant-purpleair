name: Build BYOB date badge task

on:
  workflow_call:

jobs:

  date-badge:
    name: Build BYOB date badge job
    runs-on: ubuntu-latest
    # Caller (publish-release.yml) is responsible for restricting invocation
    # to stable releases — workflow_dispatch on main only. This task no
    # longer self-checks via NBGV's Prerelease output, since doing so paid
    # for a full get-version checkout + setup-dotnet + nbgv run on every
    # develop-push prerelease only to skip the badge update.

    steps:

      - name: Get current date step
        id: date
        run: echo "date=$(date)" >> "$GITHUB_OUTPUT"

      - name: Build BYOB date badge step
        # RubbaBoy/BYOB doesn't publish SHA-pinnable releases, so this stays
        # on the floating v1 tag (matches the upstream template).
        uses: RubbaBoy/BYOB@v1
        with:
          name: lastbuild
          label: "Last Build"
          icon: "github"
          status: ${{ steps.date.outputs.date }}
          color: "blue"
          github_token: ${{ secrets.GITHUB_TOKEN }}
