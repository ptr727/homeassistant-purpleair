name: Build BYOB date badge task

on:
  workflow_call:

permissions: {}

jobs:

  date-badge:
    name: Build BYOB date badge job
    runs-on: ubuntu-latest
    # Only update the "Last Build" badge on main; develop/PR runs would
    # otherwise overwrite it with stale-branch timestamps.
    if: ${{ github.ref_name == 'main' }}
    permissions:
      contents: read

    steps:

      - name: Get current date step
        id: date
        run: echo "date=$(date)" >> "$GITHUB_OUTPUT"

      - name: Build BYOB date badge step
        # RubbaBoy/BYOB doesn't publish SHA-pinnable releases, so this stays
        # on the floating v1 tag (matches the upstream template).
        uses: RubbaBoy/BYOB@v1
        with:
          name: lastbuild
          label: "Last Build"
          icon: "github"
          status: ${{ steps.date.outputs.date }}
          color: "blue"
          github_token: ${{ secrets.GITHUB_TOKEN }}
